name: Docs

# Builds the Sphinx site and deploys it to GitHub Pages.
#
# Sphinx autodoc imports the real `batcher` package, so the job compiles the Rust
# engine (via the maturin build backend) before building the docs. Heavy optional
# backends (ray/torch/tensorflow/vllm) are mocked in docs/conf.py, so only the core
# dependencies need to be installed.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: Install engine + docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .                       # builds batcher-engine; autodoc imports it
          pip install -r docs/requirements.txt
      - name: Build docs (warnings are errors)
        run: sphinx-build -b html -E -W --keep-going docs docs/_build/html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
