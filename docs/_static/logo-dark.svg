<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 218 48" role="img" aria-label="Batcher">
  <defs>
    <linearGradient id="bgd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#bgd)"/>
  <!-- a record batch: 3 rows x 4 columns of cells; the middle row (the active
       morsel) is amber, the rest white -->
  <g>
    <rect x="11" y="13" width="6" height="6" rx="1.6" fill="#ffffff" opacity="0.95"/>
    <rect x="19" y="13" width="6" height="6" rx="1.6" fill="#ffffff" opacity="0.95"/>
    <rect x="27" y="13" width="6" height="6" rx="1.6" fill="#ffffff" opacity="0.95"/>
    <rect x="35" y="13" width="2.5" height="6" rx="1.2" fill="#ffffff" opacity="0.55"/>
    <rect x="11" y="21" width="6" height="6" rx="1.6" fill="#fbbf24"/>
    <rect x="19" y="21" width="6" height="6" rx="1.6" fill="#fbbf24"/>
    <rect x="27" y="21" width="6" height="6" rx="1.6" fill="#fbbf24"/>
    <rect x="35" y="21" width="2.5" height="6" rx="1.2" fill="#fbbf24" opacity="0.6"/>
    <rect x="11" y="29" width="6" height="6" rx="1.6" fill="#ffffff" opacity="0.95"/>
    <rect x="19" y="29" width="6" height="6" rx="1.6" fill="#ffffff" opacity="0.95"/>
    <rect x="27" y="29" width="6" height="6" rx="1.6" fill="#ffffff" opacity="0.95"/>
    <rect x="35" y="29" width="2.5" height="6" rx="1.2" fill="#ffffff" opacity="0.55"/>
  </g>
  <text x="58" y="32.5" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="25" font-weight="800" letter-spacing="-0.9" fill="#f1f5f9">Batcher</text>
</svg>
